name: Simple CI pipeline

on:
  push:
    branches: ["main", "feature-ci-update", "feature-pr-demo"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Run a simple command
        run: echo "this is devops"

      - name: Step 1
        run: echo "this is first step"

      - name: Step 2
        run: echo "this is my second step"
      - name: build docker image
        run: docker build -t devops
